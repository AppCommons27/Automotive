<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automotive Intelligence Daily</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f12;--surface:#151820;--surface2:#1c2030;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#e8eaf0;--text2:#8a8fa8;--text3:#555b72;
    --accent:#1fce8a;--accent2:#0ea571;
    --blue:#4a9eff;--amber:#f5a623;--coral:#ff6b6b;--purple:#9b7fe8;
    --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .brand-icon svg{width:18px;height:18px;}
  .brand-name{font-size:15px;font-weight:600;}
  .brand-sub{font-size:11px;color:var(--text3);font-family:var(--mono);}
  .topbar-right{display:flex;align-items:center;gap:8px;}
  #today-label{font-size:12px;color:var(--text3);font-family:var(--mono);}
  .btn{font-size:12px;padding:6px 14px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font);transition:all 0.15s;white-space:nowrap;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn-accent{background:var(--accent);color:#0d1a12;border-color:var(--accent);font-weight:600;}
  .btn-accent:hover{opacity:0.88;color:#0d1a12;border-color:var(--accent);}
  .user-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1px solid var(--border2);}
  #api-setup{max-width:520px;margin:4rem auto;padding:2rem;background:var(--surface);border:1px solid var(--border2);border-radius:16px;}
  #api-setup h2{font-size:18px;font-weight:500;margin-bottom:0.4rem;}
  #api-setup p{font-size:13px;color:var(--text2);margin-bottom:1.25rem;line-height:1.7;}
  .input-row{display:flex;gap:8px;margin-bottom:8px;}
  .api-input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color 0.15s;}
  .api-input:focus{border-color:var(--accent);}
  .setup-note{font-size:11px;color:var(--text3);margin-top:8px;}
  .setup-note a{color:var(--blue);text-decoration:none;}
  .divider-or{text-align:center;font-size:12px;color:var(--text3);margin:1rem 0;position:relative;}
  .divider-or::before,.divider-or::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border2);}
  .divider-or::before{left:0;}.divider-or::after{right:0;}
  .btn-google{width:100%;padding:10px;display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text);cursor:pointer;font-family:var(--font);font-size:13px;transition:all 0.15s;}
  .btn-google:hover{border-color:var(--blue);color:var(--blue);}
  .btn-google svg{width:16px;height:16px;flex-shrink:0;}
  #main{display:none;max-width:960px;margin:0 auto;padding:2rem 2rem 4rem;}
  .nav-tabs{display:flex;gap:4px;margin-bottom:2rem;border-bottom:1px solid var(--border);}
  .nav-tab{padding:8px 16px;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font);}
  .nav-tab:hover{color:var(--text2);}
  .nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .loading-wrap{text-align:center;padding:5rem 0;}
  .spinner{width:36px;height:36px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:13px;color:var(--text3);font-family:var(--mono);}
  .section-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
  .section-dot{width:8px;height:8px;border-radius:50%;}
  .dot-global{background:var(--accent);}.dot-na{background:var(--blue);}
  .section-title{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);}
  .section-divider{height:1px;background:var(--border);margin:2rem 0;}
  .cards-grid{display:flex;flex-direction:column;gap:10px;}
  .news-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.2s;}
  .news-card:hover{border-color:var(--border2);}
  .news-card.expanded{border-color:var(--accent2);}
  .card-main{padding:1rem 1.25rem;}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
  .badges{display:flex;gap:6px;flex-wrap:wrap;}
  .badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;font-family:var(--mono);}
  .b-global{background:rgba(31,206,138,0.12);color:var(--accent);border:1px solid rgba(31,206,138,0.2);}
  .b-na{background:rgba(74,158,255,0.12);color:var(--blue);border:1px solid rgba(74,158,255,0.2);}
  .b-newcar{background:rgba(155,127,232,0.12);color:var(--purple);border:1px solid rgba(155,127,232,0.2);}
  .b-arch{background:rgba(245,166,35,0.12);color:var(--amber);border:1px solid rgba(245,166,35,0.2);}
  .b-design{background:rgba(255,107,107,0.12);color:var(--coral);border:1px solid rgba(255,107,107,0.2);}
  .read-time{font-size:11px;color:var(--text3);font-family:var(--mono);white-space:nowrap;}
  .card-title{font-size:14px;font-weight:500;line-height:1.5;margin-bottom:5px;}
  .card-summary{font-size:13px;color:var(--text2);line-height:1.6;}
  .card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
  .card-source{font-size:11px;color:var(--text3);font-family:var(--mono);}
  .expand-hint{font-size:11px;color:var(--text3);}
  .expand-arrow{transition:transform 0.2s;display:inline-block;}
  .expanded .expand-arrow{transform:rotate(180deg);}
  .report-panel{display:none;border-top:1px solid var(--border);background:var(--surface2);padding:1.25rem;}
  .report-panel.open{display:block;}
  .report-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  @media(max-width:600px){.report-grid{grid-template-columns:1fr;}}
  .report-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.9rem 1rem;}
  .report-block.full{grid-column:1/-1;}
  .rblock-label{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);margin-bottom:6px;}
  .rblock-text{font-size:13px;color:var(--text2);line-height:1.7;}
  .rblock-points{list-style:none;}
  .rblock-points li{font-size:13px;color:var(--text2);line-height:1.65;padding:3px 0 3px 14px;position:relative;}
  .rblock-points li::before{content:'·';position:absolute;left:0;color:var(--accent);}
  .tags-row{display:flex;gap:8px;flex-wrap:wrap;}
  .tag-high{background:rgba(255,107,107,0.12);color:var(--coral);border:1px solid rgba(255,107,107,0.2);font-size:11px;padding:3px 10px;border-radius:20px;font-family:var(--mono);}
  .tag-mid{background:rgba(245,166,35,0.12);color:var(--amber);border:1px solid rgba(245,166,35,0.2);font-size:11px;padding:3px 10px;border-radius:20px;font-family:var(--mono);}
  .tag-watch{background:rgba(31,206,138,0.12);color:var(--accent);border:1px solid rgba(31,206,138,0.2);font-size:11px;padding:3px 10px;border-radius:20px;font-family:var(--mono);}
  #history-view{display:none;}
  .history-empty{text-align:center;padding:4rem 0;font-size:13px;color:var(--text3);}
  .history-date-group{margin-bottom:2rem;}
  .history-date-label{font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:0.06em;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);}
  .history-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
  .history-item:last-child{border-bottom:none;}
  .history-badges{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;max-width:120px;}
  .history-title{font-size:13px;color:var(--text);line-height:1.5;flex:1;}
  .history-source{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
  .footer-note{text-align:center;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border);font-size:12px;color:var(--text3);line-height:1.8;}
  .error-msg{text-align:center;padding:3rem 1rem;}
  .error-msg p{color:var(--text2);font-size:14px;}
  .error-detail{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:8px;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 18 18" fill="none">
        <rect x="1" y="6" width="16" height="8" rx="3" fill="#0d1a12"/>
        <circle cx="5" cy="14" r="2" fill="#0d1a12"/>
        <circle cx="13" cy="14" r="2" fill="#0d1a12"/>
        <path d="M3 6L5.5 2H12.5L15 6" stroke="#0d1a12" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">Automotive Intelligence</div>
      <div class="brand-sub">Daily Industry Briefing</div>
    </div>
  </div>
  <div class="topbar-right">
    <span id="today-label"></span>
    <button class="btn" onclick="refresh()" id="btn-refresh" style="display:none">↻ 重新整理</button>
    <img id="user-avatar" class="user-avatar" style="display:none" />
    <span id="user-name" style="font-size:12px;color:var(--text3);display:none;"></span>
    <button class="btn" onclick="doSignOut()" id="btn-signout" style="display:none">登出</button>
  </div>
</div>

<div id="api-setup">
  <h2>設定 Automotive Intelligence</h2>
  <p>輸入 Anthropic API Key，並用 Google 登入以啟用歷史紀錄功能。</p>
  <div class="input-row">
    <input type="password" class="api-input" id="api-key-input" placeholder="sk-ant-api03-..." />
    <button class="btn btn-accent" onclick="saveKey()">儲存 Key</button>
  </div>
  <div id="key-status" style="font-size:11px;color:var(--accent);margin-bottom:4px;display:none;">✓ API Key 已儲存</div>
  <div class="setup-note">前往 <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> 取得 API Key</div>
  <div class="divider-or">然後</div>
  <button class="btn-google" onclick="doSignIn()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    用 Google 帳號登入（啟用歷史紀錄）
  </button>
  <div style="margin-top:0.75rem;">
    <button class="btn" onclick="startWithoutLogin()" id="btn-skip" style="display:none;width:100%;">不登入，直接開始 →</button>
  </div>
</div>

<div id="main">
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-today" onclick="switchTab('today')">今日新聞</button>
    <button class="nav-tab" id="tab-history" onclick="switchTab('history')">歷史紀錄</button>
  </div>
  <div id="today-view"><div id="content"></div></div>
  <div id="history-view"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut as fbSignOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDocs, collection, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCDET3YjFAVFwJnPPsGz6pSuVLGDfBiRng",
  authDomain: "automotive-intelligence-a8a0f.firebaseapp.com",
  projectId: "automotive-intelligence-a8a0f",
  storageBucket: "automotive-intelligence-a8a0f.firebasestorage.app",
  messagingSenderId: "39378971944",
  appId: "1:39378971944:web:7a8b854484aa2422ccf41d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
const STORAGE_KEY = 'automotive_intel_api_key';

let currentUser = null;
const today = new Date();
const dateStr = today.toISOString().split('T')[0];

document.getElementById('today-label').textContent =
  today.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

const savedKey = localStorage.getItem(STORAGE_KEY);
if (savedKey) {
  document.getElementById('api-key-input').value = savedKey;
  document.getElementById('key-status').style.display = 'block';
  document.getElementById('btn-skip').style.display = 'block';
}

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('api-setup').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    document.getElementById('user-avatar').src = user.photoURL;
    document.getElementById('user-avatar').style.display = 'block';
    document.getElementById('user-name').textContent = user.displayName;
    document.getElementById('user-name').style.display = 'block';
    document.getElementById('btn-signout').style.display = 'block';
    document.getElementById('btn-refresh').style.display = 'block';
    window._apiKey = localStorage.getItem(STORAGE_KEY);
    if (window._apiKey) fetchNews();
    else {
      document.getElementById('main').style.display = 'none';
      document.getElementById('api-setup').style.display = 'block';
      alert('請先輸入並儲存 API Key');
    }
  }
});

window.doSignIn = async () => {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key.startsWith('sk-')) { alert('請先輸入有效的 Anthropic API Key'); return; }
  localStorage.setItem(STORAGE_KEY, key);
  window._apiKey = key;
  document.getElementById('key-status').style.display = 'block';
  try { await signInWithPopup(auth, provider); }
  catch(e) { alert('登入失敗：' + e.message); }
};

window.saveKey = () => {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key.startsWith('sk-')) { alert('請輸入有效的 API Key（以 sk- 開頭）'); return; }
  localStorage.setItem(STORAGE_KEY, key);
  window._apiKey = key;
  document.getElementById('key-status').style.display = 'block';
  document.getElementById('btn-skip').style.display = 'block';
};

window.startWithoutLogin = () => {
  const key = localStorage.getItem(STORAGE_KEY);
  if (!key) { alert('請先儲存 API Key'); return; }
  window._apiKey = key;
  document.getElementById('api-setup').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('btn-refresh').style.display = 'block';
  fetchNews();
};

window.doSignOut = async () => {
  await fbSignOut(auth);
  currentUser = null;
  document.getElementById('main').style.display = 'none';
  document.getElementById('api-setup').style.display = 'block';
  document.getElementById('user-avatar').style.display = 'none';
  document.getElementById('user-name').style.display = 'none';
  document.getElementById('btn-signout').style.display = 'none';
  document.getElementById('btn-refresh').style.display = 'none';
};

window.switchTab = (tab) => {
  document.getElementById('tab-today').classList.toggle('active', tab==='today');
  document.getElementById('tab-history').classList.toggle('active', tab==='history');
  document.getElementById('today-view').style.display = tab==='today' ? 'block' : 'none';
  document.getElementById('history-view').style.display = tab==='history' ? 'block' : 'none';
  if (tab==='history') loadHistory();
};

async function saveToHistory(news) {
  if (!currentUser) return;
  try {
    await setDoc(doc(db,'users',currentUser.uid,'dailyNews',dateStr),{
      date:dateStr, savedAt:new Date().toISOString(), news
    });
  } catch(e) { console.log('儲存失敗',e); }
}

async function loadHistory() {
  const view = document.getElementById('history-view');
  if (!currentUser) {
    view.innerHTML = '<div class="history-empty">請登入 Google 帳號以查看歷史紀錄</div>'; return;
  }
  view.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">載入歷史紀錄...</div></div>';
  try {
    const q = query(collection(db,'users',currentUser.uid,'dailyNews'),orderBy('date','desc'));
    const snap = await getDocs(q);
    if (snap.empty) { view.innerHTML = '<div class="history-empty">目前還沒有歷史紀錄<br>每次載入新聞後會自動儲存</div>'; return; }
    let html = '';
    snap.forEach(d => {
      const data = d.data();
      const label = new Date(data.date).toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
      html += `<div class="history-date-group"><div class="history-date-label">${label} · ${data.news.length} 則新聞</div>`;
      data.news.forEach(n => {
        html += `<div class="history-item">
          <div class="history-badges">
            <span class="badge ${RB[n.region]||'b-global'}">${RL[n.region]||n.region}</span>
            <span class="badge ${TB[n.type]||'b-newcar'}">${TL[n.type]||n.type}</span>
          </div>
          <div><div class="history-title">${n.title}</div><div class="history-source">${n.source}</div></div>
        </div>`;
      });
      html += '</div>';
    });
    view.innerHTML = html;
  } catch(e) { view.innerHTML = `<div class="history-empty">載入失敗：${e.message}</div>`; }
}

const RB={global:'b-global',na:'b-na'};
const RL={global:'全球',na:'北美'};
const TB={'new-car':'b-newcar',arch:'b-arch',design:'b-design'};
const TL={'new-car':'新車',arch:'新架構',design:'新設計'};

window.refresh = fetchNews;

async function fetchNews() {
  document.getElementById('content').innerHTML = `<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">搜尋今日車用產業動態中...</div><div style="font-size:11px;color:var(--text3);margin-top:6px;font-family:var(--mono);">全球 · 北美 · 新車 · 新架構 · 新設計</div></div>`;
  const sys = `你是資深車用產業分析師，專注Smart Cockpit與車載顯示解決方案。請搜尋今天（${dateStr}）最新汽車新聞，回傳嚴格JSON，不含任何markdown或說明文字。格式：{"news":[{"id":1,"region":"global","type":"new-car","title":"標題繁體中文25字內","summary":"一句話摘要30字內","source":"媒體名稱","readMin":4,"report":{"background":"背景80-120字","keyPoints":["重點一","重點二","重點三"],"impact":"產業影響60-80字","cockpit":"SmartCockpit商機分析50-70字","tags":["high"]}}]}必須回傳6則：3則global，3則na。type只能是new-car/arch/design。tags從high/mid/watch選1-2個。只回傳純JSON。`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':window._apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,tools:[{type:'web_search_20250305',name:'web_search'}],system:sys,messages:[{role:'user',content:`請搜尋並回傳今天${dateStr}最新的6則全球與北美汽車產業新聞，嚴格依照JSON格式。`}]})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${res.status}`);}
    const data=await res.json();
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean.substring(clean.indexOf('{'),clean.lastIndexOf('}')+1));
    renderNews(parsed.news);
    saveToHistory(parsed.news);
  } catch(e) {
    document.getElementById('content').innerHTML=`<div class="error-msg"><p>⚠️ 載入失敗，請確認 API Key 正確後重新整理</p><div class="error-detail">${e.message}</div></div>`;
  }
}

function renderNews(news) {
  const global=news.filter(n=>n.region==='global');
  const na=news.filter(n=>n.region==='na');
  let html=sHTML('全球 · GLOBAL','dot-global',global)+'<div class="section-divider"></div>'+sHTML('北美 · NORTH AMERICA','dot-na',na);
  html+=`<div class="footer-note">以上新聞由 Claude + Web Search 即時整理 · ${today.toLocaleDateString('zh-TW')}${currentUser?'<br>✓ 已自動儲存至歷史紀錄':''}</div>`;
  document.getElementById('content').innerHTML=html;
}

function sHTML(label,dot,items){
  return `<div class="section-header"><span class="section-dot ${dot}"></span><span class="section-title">${label}</span></div><div class="cards-grid">${items.map(cHTML).join('')}</div>`;
}

function cHTML(n){
  const tags=(n.report.tags||[]).map(t=>t==='high'?`<span class="tag-high">高影響</span>`:t==='mid'?`<span class="tag-mid">中影響</span>`:`<span class="tag-watch">持續觀察</span>`).join('');
  const pts=Array.isArray(n.report.keyPoints)?n.report.keyPoints.map(p=>`<li>${p}</li>`).join(''):String(n.report.keyPoints).split('・').filter(Boolean).map(p=>`<li>${p.trim()}</li>`).join('');
  return `<div class="news-card" id="card-${n.id}" onclick="toggle(${n.id})">
    <div class="card-main">
      <div class="card-top"><div class="badges"><span class="badge ${RB[n.region]||'b-global'}">${RL[n.region]||n.region}</span><span class="badge ${TB[n.type]||'b-newcar'}">${TL[n.type]||n.type}</span></div><span class="read-time">${n.readMin} min</span></div>
      <div class="card-title">${n.title}</div>
      <div class="card-summary">${n.summary}</div>
      <div class="card-footer"><span class="card-source">${n.source}</span><span class="expand-hint"><span class="expand-arrow">↓</span> 展開分析</span></div>
    </div>
    <div class="report-panel" id="report-${n.id}">
      <div class="report-grid">
        <div class="report-block full"><div class="rblock-label">背景</div><div class="rblock-text">${n.report.background}</div></div>
        <div class="report-block"><div class="rblock-label">三大重點</div><ul class="rblock-points">${pts}</ul></div>
        <div class="report-block"><div class="rblock-label">產業影響</div><div class="rblock-text">${n.report.impact}</div></div>
        <div class="report-block full"><div class="rblock-label">Smart Cockpit 商機分析</div><div class="rblock-text">${n.report.cockpit}</div></div>
      </div>
      <div class="tags-row">${tags}</div>
    </div>
  </div>`;
}

let openId=null;
window.toggle=(id)=>{
  if(openId&&openId!==id){document.getElementById(`report-${openId}`)?.classList.remove('open');document.getElementById(`card-${openId}`)?.classList.remove('expanded');}
  const panel=document.getElementById(`report-${id}`);const card=document.getElementById(`card-${id}`);
  if(!panel)return;
  const isOpen=panel.classList.contains('open');
  panel.classList.toggle('open',!isOpen);card.classList.toggle('expanded',!isOpen);
  openId=isOpen?null:id;
};

document.getElementById('api-key-input').addEventListener('keydown',e=>{if(e.key==='Enter')window.saveKey();});
</script>
</body>
</html>
